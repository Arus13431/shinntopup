      <stop offset="0%" stop-color="#021f3d" />
      <stop offset="50%" stop-color="#006b94" />
      <stop offset="100%" stop-color="#00e1ff" />
    </linearGradient>
    <filter id="glow-genshin">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
