<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="coc-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2202" />
      <stop offset="50%" stop-color="#936d00" />
      <stop offset="100%" stop-color="#ffbf00" />
    </linearGradient>
    <filter id="glow-coc">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#coc-neon)"/>
  <rect width="382" height="232" x="9" y="9" rx="12" fill="#0f0b00" opacity="0.9"/>
  <!-- Shield/Sword/Gold representation -->
  <g transform="translate(200, 105)" filter="url(#glow-coc)">
    <path d="M 0 -35 L 25 -10 L 15 25 L -15 25 L -25 -10 Z" fill="#ffbf00"/>
    <path d="M 0 -25 L 15 -8 L 8 18 L -8 18 L -15 -8 Z" fill="#0f0b00"/>
  </g>
  <text x="200" y="195" font-family="'Outfit', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="3">CLASH OF CLANS</text>
  <text x="200" y="215" font-family="'Inter', sans-serif" font-size="11" fill="#ffbf00" text-anchor="middle" letter-spacing="2">STRATEGY CLAN RPG</text>
</svg>
