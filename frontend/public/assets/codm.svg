<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="codm-neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141c24" />
      <stop offset="50%" stop-color="#34495e" />
      <stop offset="100%" stop-color="#7f8c8d" />
    </linearGradient>
    <filter id="glow-codm">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#codm-neon)"/>
  <rect width="382" height="232" x="9" y="9" rx="12" fill="#080c10" opacity="0.9"/>
  <!-- Target reticle / Skull representation -->
  <g transform="translate(200, 105)" filter="url(#glow-codm)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#7f8c8d" stroke-width="4"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#7f8c8d" stroke-width="3" />
    <line x1="0" y1="-40" x2="0" y2="40" stroke="#7f8c8d" stroke-width="3" />
  </g>
  <text x="200" y="195" font-family="'Outfit', sans-serif" font-size="24" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="3">COD MOBILE</text>
  <text x="200" y="215" font-family="'Inter', sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle" letter-spacing="3">TACTICAL SHOOTER FPS</text>
</svg>
