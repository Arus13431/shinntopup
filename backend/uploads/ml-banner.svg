<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <linearGradient id="ml-banner-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#051937" />
      <stop offset="30%" stop-color="#004d7a" />
      <stop offset="70%" stop-color="#008793" />
      <stop offset="100%" stop-color="#00bf72" />
    </linearGradient>
    <filter id="glow-banner">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#ml-banner-grad)"/>
  <rect width="1160" height="360" x="20" y="20" rx="16" fill="#0f1923" opacity="0.8"/>
  <g transform="translate(150, 200)">
    <circle cx="0" cy="0" r="80" fill="none" stroke="#008793" stroke-width="8" filter="url(#glow-banner)"/>
    <path d="M 0 -50 L 50 0 L 0 50 L -50 0 Z" fill="#00bf72" filter="url(#glow-banner)"/>
  </g>
  <text x="350" y="200" font-family="'Outfit', sans-serif" font-size="56" font-weight="800" fill="#ffffff" letter-spacing="4">MOBILE LEGENDS</text>
  <text x="350" y="250" font-family="'Inter', sans-serif" font-size="20" fill="#00bf72" letter-spacing="2">TOP-UP BERLIAN INSTAN & AMAN</text>
</svg>
