<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="ml-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052D4" />
      <stop offset="50%" stop-color="#4364F7" />
      <stop offset="100%" stop-color="#6FB1FC" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#ml-grad)"/>
  <rect width="380" height="230" x="10" y="10" rx="12" fill="#0f1923" opacity="0.85"/>
  <circle cx="200" cy="110" r="45" fill="none" stroke="#4364F7" stroke-width="4" filter="url(#glow)"/>
  <!-- Diamond Shape -->
  <path d="M 200 80 L 230 110 L 200 140 L 170 110 Z" fill="#6FB1FC" filter="url(#glow)"/>
  <text x="200" y="195" font-family="'Outfit', sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">MOBILE LEGENDS</text>
  <text x="200" y="215" font-family="'Inter', sans-serif" font-size="12" fill="#6FB1FC" text-anchor="middle" letter-spacing="1">BANG BANG</text>
</svg>
