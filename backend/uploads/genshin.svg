<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="genshin-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E2DE2" />
      <stop offset="100%" stop-color="#4A00E0" />
    </linearGradient>
    <filter id="glow-genshin">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="400" height="250" rx="16" fill="url(#genshin-grad)"/>
  <rect width="380" height="230" x="10" y="10" rx="12" fill="#0f1923" opacity="0.85"/>
  <g transform="translate(200, 110)" filter="url(#glow-genshin)">
    <!-- Star symbol representing Primogem -->
    <path d="M 0 -35 L 8 -10 L 33 -10 L 13 5 L 21 30 L 0 15 L -21 30 L -13 5 L -33 -10 L -8 -10 Z" fill="#E0AA3E"/>
  </g>
  <text x="200" y="195" font-family="'Outfit', sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">GENSHIN IMPACT</text>
  <text x="200" y="215" font-family="'Inter', sans-serif" font-size="12" fill="#8E2DE2" text-anchor="middle" letter-spacing="1">COGNOSPHERE</text>
</svg>
